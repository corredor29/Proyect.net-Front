<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AutoTaller Manager</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<link rel="stylesheet" href="css/main.css">
<link rel="stylesheet" href="css/login.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
</head>

<body>

<div class="container">

    <div class="login-section">

        <div class="logo">
            <div class="logo-icon">
                <i class="ti ti-car"></i>
            </div>
            <div>
                <h2>AutoTaller</h2>
                <span>Management System</span>
            </div>
        </div>

        <h1>Login</h1>


        <!-- Contenedor para el botón oficial de Google -->
        <div id="googleSignInBtn" style="display:flex;justify-content:center;margin:8px 0"></div>

        <div class="divider">
            <span>Or sign in with email</span>
        </div>

        <div id="loginError" class="error-box">
            Error
        </div>

        <form id="loginForm">

            <div class="input-group">
                <input type="email" id="email" placeholder="Email" required>
            </div>

            <div class="input-group">
                <input type="password" id="password" placeholder="Password" required>
                <button type="button" class="eye-btn" id="togglePwd">
                    <i class="ti ti-eye"></i>
                </button>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox">
                    Keep me logged in
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="login-btn">Login</button>

        </form>

        <div class="signup">
            Don't have an account?
            <a href="register.html">Sign up</a>
        </div>

    </div>

    <div class="hero-section">
        <div class="hero-content">
            <div class="car-icon">
                <i class="ti ti-car"></i>
            </div>
            <h2>Gestiona tu taller de forma inteligente</h2>
            <p>Clientes, vehículos, órdenes de servicio, inventario y facturación en un solo lugar.</p>
        </div>
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
        <div class="shape shape3"></div>
        <div class="shape shape4"></div>
    </div>

</div>

<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/login.js"></script>

</body>
</html>
